name: Install scripts

on:
  push:
    branches: [main]
    paths: ["scripts/**", ".github/workflows/install.yml"]
  pull_request:
    branches: ["*"]
    paths: ["scripts/**", ".github/workflows/install.yml"]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint install.sh
        run: shellcheck scripts/install.sh

  bash-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check install.sh
        run: bash -n scripts/install.sh

  bash-resolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Exercise version resolution
        run: |
          source <(sed -n '13,63p' scripts/install.sh)
          VERSION="$(latest_version)"
          echo "Resolved version: $VERSION"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "version did not parse"; exit 1; }

  powershell-parse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check install.ps1
        shell: pwsh
        run: $null = [System.Management.Automation.Language.Parser]::ParseFile("$PWD/scripts/install.ps1", [ref]$null, [ref]$null)
