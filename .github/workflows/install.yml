name: Install scripts

on:
  push:
    branches: [main]
    paths: ["scripts/**", ".github/workflows/install.yml"]
  pull_request:
    branches: ["*"]
    paths: ["scripts/**", ".github/workflows/install.yml"]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint install.sh
        run: shellcheck scripts/install.sh

  bash-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check install.sh
        run: bash -n scripts/install.sh

  powershell-parse:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check install.ps1
        shell: pwsh
        run: $null = [System.Management.Automation.Language.Parser]::ParseFile("$PWD/scripts/install.ps1", [ref]$null, [ref]$null)
